# This file generates the GitHub Actions matrix.
# For simple board + shield combinations, add them to the top level board and
# shield arrays, for more control, add individual board + shield combinations
# to the `include` property. You can also use the `cmake-args` property to
# pass flags to the build command, `snippet` to add a Zephyr snippet, and
# `artifact-name` to assign a name to distinguish build outputs from each other:
#
# board: [ "nice_nano_v2" ]
# shield: [ "corne_left", "corne_right" ]
# include:
#   - board: bdn9_rev2
#   - board: nice_nano_v2
#     shield: reviung41
#   - board: nice_nano_v2
#     shield: corne_left
#     snippet: studio-rpc-usb-uart
#     cmake-args: -DCONFIG_ZMK_STUDIO=y
#     artifact-name: corne_left_with_studio
#
---
include:
  # - board: nice_nano_v2
  #   shield: corne_right
  #   snippet: studio-rpc-usb-uart
  #   # snippet: zmk-usb-logging
  #   cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DZMK_KEYBOARD_NAME=corne_r
  # - board: nice_nano_v2
  #   shield: corne_left custom_display
  #   cmake-args: -DCONFIG_ZMK_STUDIO=y -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DZMK_KEYBOARD_NAME=corne_l
  - board: nice_nano//zmk
    shield: lily58_left # nice_view_adapter nice_view
    cmake-args: -DCONFIG_ZMK_STUDIO=n -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DZMK_KEYBOARD_NAME=lily58_l
    artifact-name: lily58_left_dongle
  - board: nice_nano//zmk
    shield: lily58_left # nice_view_adapter nice_view
    cmake-args: -DCONFIG_ZMK_STUDIO=n -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=y -DZMK_KEYBOARD_NAME=lily58_l_central
    artifact-name: lily58_left_central
  - board: nice_nano//zmk
    shield: lily58_right
    cmake-args: -DCONFIG_ZMK_STUDIO=n -DCONFIG_ZMK_SPLIT_ROLE_CENTRAL=n -DZMK_KEYBOARD_NAME=lily58_r
    artifact-name: lily58_right
    # snippet: zmk-usb-logging
  - board: nice_nano//zmk
    shield: settings_reset
  - board: xiao_ble//zmk
    snippet: studio-rpc-usb-uart
    shield: lily58_dongle dongle_screen
    cmake-args: -DCONFIG_ZMK_STUDIO=y -DZMK_KEYBOARD_NAME=lily58_dongle
  # - board: xiao_ble//zmk
  #   snippet: studio-rpc-usb-uart
  #   shield: macro_16
  #   cmake-args: -DCONFIG_ZMK_STUDIO=y -DZMK_KEYBOARD_NAME=macro_16

